name: "Sync Release to Develop"

on:
  workflow_call:
    inputs:
      release_branch_pattern:
        description: "Regex pattern for valid release branches"
        required: false
        type: string
        default: "^release[-_]([0-9]{4}|[0-9]{8})$"

permissions:
  contents: write

jobs:
  sync-release-to-develop:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ ! "$BRANCH" =~ ${{ inputs.release_branch_pattern }} ]]; then
            echo "Skipping non-release branch: $BRANCH"
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        if: env.SKIP != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        if: env.SKIP != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge release into develop
        if: env.SKIP != 'true'
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git checkout develop || git checkout -b develop
          git merge "origin/$BRANCH" --no-edit
          git push origin develop

      - name: Notify Teams on failure
        if: failure() && env.SKIP != 'true'
        shell: bash
        env:
          SYNC_TEAMS_WEBHOOK_URL: ${{ secrets.SYNC_TEAMS_WEBHOOK_URL }}
          TEAMS_MENTION_EMAILS: ${{ secrets.SYNC_TEAMS_MENTION_EMAILS }}
        run: |
          if [ -z "$SYNC_TEAMS_WEBHOOK_URL" ]; then
            echo "SYNC_TEAMS_WEBHOOK_URL not set, skipping Teams notification"
            exit 0
          fi
          BRANCH="${GITHUB_REF#refs/heads/}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MENTION_TEXT=""
          MENTION_ENTITIES="[]"
          if [ -n "$TEAMS_MENTION_EMAILS" ]; then
            IFS=',' read -ra EMAILS <<< "$TEAMS_MENTION_EMAILS"
            ENTITIES=""
            for EMAIL in "${EMAILS[@]}"; do
              EMAIL=$(echo "$EMAIL" | xargs)
              NAME="${EMAIL%%@*}"
              MENTION_TEXT="$MENTION_TEXT <at>$NAME</at>"
              ENTITY='{"type":"mention","text":"<at>'"$NAME"'</at>","mentioned":{"id":"'"$EMAIL"'","name":"'"$NAME"'"}}'
              ENTITIES="${ENTITIES:+$ENTITIES,}$ENTITY"
            done
            MENTION_ENTITIES="[$ENTITIES]"
          fi

          cat <<EOF > /tmp/teams-payload.json
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  {
                    "type": "TextBlock",
                    "text": "⚠ Auto-merge failed",
                    "weight": "Bolder",
                    "size": "Medium",
                    "color": "Attention"
                  },
                  {
                    "type": "FactSet",
                    "facts": [
                      { "title": "Project:", "value": "$REPO" },
                      { "title": "Merge:", "value": "$BRANCH → develop" }
                    ]
                  },
                  {
                    "type": "TextBlock",
                    "text": "Merge conflicts need to be resolved manually.$MENTION_TEXT",
                    "wrap": true
                  }
                ],
                "actions": [
                  {
                    "type": "Action.OpenUrl",
                    "title": "View workflow run",
                    "url": "$RUN_URL"
                  }
                ],
                "msteams": {
                  "entities": $MENTION_ENTITIES
                }
              }
            }]
          }
          EOF

          curl -H "Content-Type: application/json" -d @/tmp/teams-payload.json "$SYNC_TEAMS_WEBHOOK_URL"
